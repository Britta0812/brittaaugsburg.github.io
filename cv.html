<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CV | Britta Augsburg</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>

    :root {
      --ink:       #1e1b18;
      --ink-light: #4a453d;
      --ink-muted: #9a938a;
      --paper:     #ffffff;
      --paper-warm:#f5f0e6;
      --rule:      #e0d8cc;
      --accent:    #7a5c3a;
      --accent2:   #3a6a5a;
      --accent3:   #8a5030;
      --gold:      #c8a060;
      --wash:      #2c6a60;
      --stim:      #a06a20;
      --nutr:      #8a4828;
      --col-max:   860px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; font-size: 17px; }

    body {
      font-family: 'Source Sans 3', system-ui, sans-serif;
      background: var(--paper);
      color: var(--ink);
      line-height: 1.72;
    }

    /* ─── LAYOUT ─── */
    .site-wrapper { display: flex; min-height: 100vh; }

    /* ─── SIDEBAR NAV ─── */
    .sidebar {
      position: fixed;
      top: 0; left: 0;
      width: 240px;
      height: 100vh;
      background: var(--paper);
      color: var(--ink);
      display: flex;
      flex-direction: column;
      padding: 2.8rem 1.6rem 2rem;
      z-index: 100;
      border-right: 2px solid var(--rule);
    }

    .sidebar-name {
      font-family: 'Source Sans 3', system-ui, sans-serif;
      font-weight: 300;
      font-size: 1.25rem;
      line-height: 1.3;
      letter-spacing: 0.02em;
      color: var(--ink);
      margin-bottom: 0.3rem;
    }
    .sidebar-title {
      font-family: 'DM Mono', monospace;
      font-size: 0.58rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 2.4rem;
    }

    .sidebar nav { flex: 1; }
    .sidebar nav a {
      display: block;
      font-family: 'DM Mono', monospace;
      font-size: 0.62rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--ink-light);
      text-decoration: none;
      padding: 0.55rem 0;
      border-bottom: 1px solid var(--rule);
      transition: color 0.2s;
    }
    .sidebar nav a:hover,
    .sidebar nav a.active { color: var(--gold); }


    .subnav { padding: 0.2rem 0 0.4rem 0.6rem; }
    .subnav a {
      display: block;
      font-family: 'DM Mono', monospace;
      font-size: 0.55rem;
      letter-spacing: 0.1em;
      color: var(--ink-muted);
      text-decoration: none;
      padding: 0.3rem 0;
      border-bottom: none;
      transition: color 0.2s;
    }
    .subnav a:hover { color: var(--accent); }
    .sidebar-contact {
      margin-top: 1.2rem;
      border-top: 1px solid var(--rule);
      padding-top: 1rem;
    }
    .sidebar-contact a {
      display: flex;
      align-items: flex-start;
      gap: 0.5rem;
      font-size: 0.72rem;
      color: var(--ink-light);
      text-decoration: none;
      padding: 0.3rem 0;
      line-height: 1.4;
      transition: color 0.15s;
    }
    .sidebar-contact a:hover { color: var(--accent); }
    .sidebar-contact .sc-icon {
      flex-shrink: 0;
      width: 14px;
      margin-top: 1px;
      opacity: 0.6;
    }
    .sidebar-contact .sc-text { flex: 1; }
    .sidebar-affil {
      font-size: 0.7rem;
      line-height: 1.5;
      color: var(--ink-muted);
      border-top: 1px solid var(--rule);
      padding-top: 1rem;
    }

    /* ─── MAIN ─── */
    .main {
      margin-left: 240px;
      flex: 1;
      max-width: calc(100% - 240px);
    }

    /* ─── HERO ─── */
    .hero {
      background: var(--paper);
      color: var(--ink);
      padding: 4rem 4rem 3rem;
      position: relative;
      border-bottom: 2px solid var(--rule);
    }

    .hero-eyebrow {
      font-family: 'DM Mono', monospace;
      font-size: 0.62rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--ink-muted);
      margin-bottom: 1.2rem;
    }
    .hero h1 {
      font-family: 'Source Sans 3', system-ui, sans-serif;
      font-weight: 400;
      font-size: clamp(2.4rem, 5vw, 3.6rem);
      line-height: 1.1;
      letter-spacing: -0.01em;
      color: var(--ink);
      margin-bottom: 0.5rem;
    }
    .hero-inst {
      font-family: 'DM Mono', monospace;
      font-size: 0.72rem;
      letter-spacing: 0.08em;
      color: var(--accent);
      margin-bottom: 2.2rem;
    }
    .hero-tagline {
      font-size: 1.08rem;
      line-height: 1.65;
      color: var(--ink-light);
      max-width: 560px;
      font-style: italic;
      margin-bottom: 2.8rem;
    }

    /* Research pillars chips */
    .pillars {
      display: flex;
      flex-wrap: wrap;
      gap: 0.7rem;
    }
    .pillar-chip {
      font-family: 'DM Mono', monospace;
      font-size: 0.6rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 0.4rem 0.9rem;
      border-radius: 2px;
      border: 1px solid;
    }
    .pillar-chip.wash  { color: var(--wash); border-color: var(--wash); }
    .pillar-chip.stim  { color: var(--stim); border-color: var(--stim); }
    .pillar-chip.nutr  { color: var(--nutr); border-color: var(--nutr); }


    /* ─── HERO PHOTO LAYOUT ─── */
    .hero-inner {
      display: flex;
      align-items: flex-start;
      gap: 3rem;
      position: relative;
      z-index: 1;
    }
    .hero-photo {
      flex-shrink: 0;
      width: 160px;
      height: 200px;
      object-fit: cover;
      object-position: center top;
      border: 2px solid var(--rule);
      filter: grayscale(15%);
    }
    .hero-photo-placeholder {
      flex-shrink: 0;
      width: 160px;
      height: 200px;
      background: #faf7f2;
      border: 2px dashed var(--rule);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'DM Mono', monospace;
      font-size: 0.55rem;
      letter-spacing: 0.1em;
      color: var(--ink-muted);
      text-align: center;
      padding: 1rem;
    }
    .hero-text { flex: 1; }

    /* ─── SECTIONS ─── */
    section { padding: 4rem 4rem; border-bottom: 1px solid var(--rule); }
    section:last-child { border-bottom: none; }

    .section-label {
      font-family: 'DM Mono', monospace;
      font-size: 0.6rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 0.6rem;
    }
    .section-title {
      font-family: 'Source Sans 3', system-ui, sans-serif;
      font-weight: 400;
      font-size: 2rem;
      line-height: 1.2;
      color: var(--ink);
      margin-bottom: 2rem;
      padding-bottom: 1rem;
      border-bottom: 2px solid var(--rule);
    }

    /* ─── ABOUT ─── */
    .about-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 3rem;
    }
    .about-bio p { margin-bottom: 1rem; color: var(--ink-light); font-size: 1rem; }
    .about-info dt {
      font-family: 'DM Mono', monospace;
      font-size: 0.6rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--ink-muted);
      margin-top: 1.1rem;
    }
    .about-info dd { color: var(--ink-light); font-size: 0.92rem; }
    .about-info a { color: var(--accent); text-decoration: none; border-bottom: 1px solid var(--rule); }
    .about-info a:hover { border-color: var(--accent); }

    /* ─── RESEARCH AREAS ─── */
    .research-intro { color: var(--ink-light); margin-bottom: 2rem; max-width: 640px; font-size: 1rem; }

    .research-areas {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1.5rem;
      margin-bottom: 3rem;
    }
    .area-card {
      border: 1px solid var(--rule);
      padding: 1.6rem 1.4rem;
      position: relative;
      background: var(--paper);
      transition: box-shadow 0.2s;
    }
    .area-card:hover { box-shadow: 0 4px 20px rgba(0,0,0,0.07); }
    .area-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0;
      width: 3px; height: 100%;
    }
    .area-card.wash::before  { background: var(--wash); }
    .area-card.stim::before  { background: var(--stim); }
    .area-card.nutr::before  { background: var(--nutr); }

    .area-tag {
      font-family: 'DM Mono', monospace;
      font-size: 0.55rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      margin-bottom: 0.6rem;
    }
    .area-card.wash .area-tag  { color: var(--wash); }
    .area-card.stim .area-tag  { color: var(--stim); }
    .area-card.nutr .area-tag  { color: var(--nutr); }

    .area-card h3 {
      font-family: 'Source Sans 3', system-ui, sans-serif;
      font-weight: 600;
      font-size: 1.18rem;
      color: var(--ink);
      margin-bottom: 0.6rem;
    }
    .area-card p { font-size: 0.88rem; color: var(--ink-light); line-height: 1.6; }

    /* ─── PUBLICATIONS ─── */
    .pub-filter {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      margin-bottom: 2rem;
    }
    .filter-btn {
      font-family: 'DM Mono', monospace;
      font-size: 0.58rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 0.35rem 0.8rem;
      border: 1px solid var(--rule);
      background: none;
      cursor: pointer;
      color: var(--ink-muted);
      border-radius: 2px;
      transition: all 0.15s;
    }
    .filter-btn:hover, .filter-btn.active {
      background: var(--ink);
      color: var(--paper-warm);
      border-color: var(--ink);
    }

    .pub-list { list-style: none; }
    .pub-item {
      padding: 1.4rem 0;
      border-bottom: 1px solid var(--rule);
      display: flex;
      gap: 1.2rem;
      align-items: flex-start;
    }
    .pub-item:last-child { border-bottom: none; }

    .pub-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      margin-top: 0.55rem;
      flex-shrink: 0;
    }
    .pub-dot.wash  { background: var(--wash); }
    .pub-dot.stim  { background: var(--stim); }
    .pub-dot.nutr  { background: var(--nutr); }
    .pub-dot.other { background: var(--ink-muted); }

    .pub-content {}
    .pub-title {
      font-size: 1rem;
      font-style: italic;
      color: var(--ink);
      line-height: 1.45;
      margin-bottom: 0.25rem;
    }
    .pub-title a {
      color: inherit;
      text-decoration: none;
      border-bottom: 1px dotted var(--rule);
      transition: border-color 0.15s;
    }
    .pub-title a:hover { border-color: var(--accent); color: var(--accent); }
    .pub-meta {
      font-size: 0.82rem;
      color: var(--ink-muted);
      line-height: 1.5;
    }
    .pub-journal { font-style: normal; }
    .pub-tag {
      display: inline-block;
      font-family: 'DM Mono', monospace;
      font-size: 0.5rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 0.15rem 0.45rem;
      border-radius: 2px;
      margin-left: 0.4rem;
      vertical-align: middle;
    }
    .pub-tag.wash  { background: rgba(44,95,90,0.1);  color: var(--wash); }
    .pub-tag.stim  { background: rgba(160,106,32,0.1); color: var(--stim); }
    .pub-tag.nutr  { background: rgba(122,68,40,0.1); color: var(--nutr); }

    /* ─── PROJECTS / GRANTS ─── */
    .project-list { list-style: none; }
    .project-item {
      display: grid;
      grid-template-columns: 90px 1fr;
      gap: 1.2rem;
      padding: 1.2rem 0;
      border-bottom: 1px solid var(--rule);
    }
    .project-item:last-child { border-bottom: none; }
    .project-years {
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      color: var(--ink-muted);
      padding-top: 0.2rem;
      line-height: 1.4;
    }
    .project-title { font-style: italic; font-size: 0.96rem; color: var(--ink); margin-bottom: 0.15rem; }
    .project-meta { font-size: 0.82rem; color: var(--ink-muted); }

    /* ─── CV ─── */
    .cv-section { margin-bottom: 2.4rem; }
    .cv-section h3 {
      font-family: 'DM Mono', monospace;
      font-size: 0.62rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--ink-muted);
      margin-bottom: 0.8rem;
      padding-bottom: 0.4rem;
      border-bottom: 1px solid var(--rule);
    }
    .cv-row {
      display: grid;
      grid-template-columns: 90px 1fr;
      gap: 1rem;
      padding: 0.5rem 0;
    }
    .cv-year {
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      color: var(--ink-muted);
      padding-top: 0.15rem;
    }
    .cv-desc { font-size: 0.92rem; color: var(--ink-light); }
    .cv-desc em { color: var(--ink); font-style: normal; font-weight: 500; }

    .cv-download {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      font-family: 'DM Mono', monospace;
      font-size: 0.62rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent);
      text-decoration: none;
      border: 1px solid var(--accent);
      padding: 0.6rem 1.1rem;
      border-radius: 2px;
      transition: all 0.2s;
      margin-bottom: 2.5rem;
    }
    .cv-download:hover { background: var(--accent); color: var(--paper); }

    /* ─── CONTACT ─── */
    .contact-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 3rem;
    }
    .contact-block dt {
      font-family: 'DM Mono', monospace;
      font-size: 0.6rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--ink-muted);
      margin-top: 1.2rem;
    }
    .contact-block dd { font-size: 0.92rem; color: var(--ink-light); margin-top: 0.2rem; }
    .contact-block a { color: var(--accent); text-decoration: none; }
    .contact-block a:hover { text-decoration: underline; }

    .affiliations-list { list-style: none; }
    .affiliations-list li {
      font-size: 0.88rem;
      color: var(--ink-light);
      padding: 0.45rem 0;
      border-bottom: 1px solid var(--rule);
      line-height: 1.5;
    }
    .affiliations-list li:last-child { border-bottom: none; }


    .pub-links {
      font-size: 0.8rem;
      color: var(--ink-muted);
      margin-top: 0.2rem;
    }
    .pub-links a {
      color: var(--accent2);
      text-decoration: none;
      border-bottom: 1px dotted var(--accent2);
      font-family: 'DM Mono', monospace;
      font-size: 0.68rem;
      letter-spacing: 0.04em;
    }
    .pub-links a:hover { border-bottom-style: solid; }

    /* ─── WORKING PAPERS ─── */
    .wp-badge {
      display: inline-block;
      font-family: 'DM Mono', monospace;
      font-size: 0.5rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      background: rgba(90,62,40,0.1);
      color: var(--accent);
      padding: 0.15rem 0.45rem;
      border-radius: 2px;
      margin-left: 0.4rem;
      vertical-align: middle;
    }

    /* ─── FOOTER ─── */
    .footer {
      padding: 2rem 4rem;
      background: var(--paper-warm);
      font-family: 'DM Mono', monospace;
      font-size: 0.6rem;
      letter-spacing: 0.08em;
      color: var(--ink-muted);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    /* ─── UTILITIES ─── */
    .hidden { display: none !important; }

    /* ─── RESPONSIVE ─── */
    @media (max-width: 900px) {
      .sidebar { display: none; }
      .main { margin-left: 0; max-width: 100%; }
      .hero { padding: 3rem 2rem; }
      section { padding: 3rem 2rem; }
      .about-grid, .contact-grid { grid-template-columns: 1fr; gap: 2rem; }
      .research-areas { grid-template-columns: 1fr; }
      .footer { padding: 1.5rem 2rem; flex-direction: column; gap: 0.5rem; text-align: center; }
    }
  
  </style>
</head>
